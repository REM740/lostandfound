{% extends 'lostandfound/base.html' %}

{% block content %}

<h2 class="text-3xl font-bold mb-6">Lost Items</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

{% for item in items %}

<div class="bg-white rounded-lg shadow p-4">

    {% if item.image %}
        <img src="{{ item.image.url }}" class="w-full h-48 object-cover rounded">
    {% endif %}

    <h3 class="text-xl font-semibold mt-3">
        {{ item.name }}
    </h3>

    <p class="text-gray-600 mt-2">
        {{ item.description }}
    </p>

    <p class="text-sm mt-2">
        <span class="font-semibold">Lost in:</span> {{ item.lost_in }}
    </p>

    <p class="text-sm text-gray-500">
        {{ item.date_lost }}
    </p>

</div>

{% empty %}

<p>No lost items found.</p>

{% endfor %}

</div>

{% endblock %}
